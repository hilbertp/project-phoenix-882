name: phoenix-local

services:
  api:
    image: python:3.12-slim
    working_dir: /workspace/apps/api
    command: ["sh", "-c", "tail -f /dev/null"]
    depends_on:
      - postgres
    volumes:
      - ../../apps/api:/workspace/apps/api
      - ../../data:/storage/data
      - ../../artifacts:/storage/artifacts

  worker:
    image: python:3.12-slim
    working_dir: /workspace/apps/worker
    command: ["sh", "-c", "tail -f /dev/null"]
    depends_on:
      - postgres
    volumes:
      - ../../apps/worker:/workspace/apps/worker
      - ../../data:/storage/data
      - ../../artifacts:/storage/artifacts

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
