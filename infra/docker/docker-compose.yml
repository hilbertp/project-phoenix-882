name: phoenix-local

services:
  api:
    image: python:3.12-slim
    working_dir: /workspace/apps/api
    command: ["sh", "-c", "tail -f /dev/null"]
    depends_on:
      - postgres
    environment:
      PHOENIX_SERVICE_ROLE: api
      PHOENIX_DATABASE_URL: ${PHOENIX_DATABASE_URL:-postgresql://phoenix:phoenix-local-only@postgres:5432/phoenix}
      PHOENIX_DATA_DIR: ${PHOENIX_DATA_DIR:-/storage/data}
      PHOENIX_ARTIFACTS_DIR: ${PHOENIX_ARTIFACTS_DIR:-/storage/artifacts}
    volumes:
      - ../../apps/api:/workspace/apps/api
      - ../../data:/storage/data
      - ../../artifacts:/storage/artifacts

  worker:
    image: python:3.12-slim
    working_dir: /workspace/apps/worker
    command: ["sh", "-c", "tail -f /dev/null"]
    depends_on:
      - postgres
    environment:
      PHOENIX_SERVICE_ROLE: worker
      PHOENIX_DATABASE_URL: ${PHOENIX_DATABASE_URL:-postgresql://phoenix:phoenix-local-only@postgres:5432/phoenix}
      PHOENIX_DATA_DIR: ${PHOENIX_DATA_DIR:-/storage/data}
      PHOENIX_ARTIFACTS_DIR: ${PHOENIX_ARTIFACTS_DIR:-/storage/artifacts}
    volumes:
      - ../../apps/worker:/workspace/apps/worker
      - ../../data:/storage/data
      - ../../artifacts:/storage/artifacts

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PHOENIX_POSTGRES_DB:-phoenix}
      POSTGRES_USER: ${PHOENIX_POSTGRES_USER:-phoenix}
      POSTGRES_PASSWORD: ${PHOENIX_POSTGRES_PASSWORD:-phoenix-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
