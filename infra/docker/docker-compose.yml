name: phoenix-local

services:
  api:
    image: python:3.12-slim
    working_dir: /workspace
    command: ["sh", "-c", "tail -f /dev/null"]
    depends_on:
      - postgres
    volumes:
      - ../../data:/workspace/data
      - ../../artifacts:/workspace/artifacts

  worker:
    image: python:3.12-slim
    working_dir: /workspace
    command: ["sh", "-c", "tail -f /dev/null"]
    depends_on:
      - postgres
    volumes:
      - ../../data:/workspace/data
      - ../../artifacts:/workspace/artifacts

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
